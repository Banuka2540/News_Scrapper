name: Auto News Scraper

on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch: 

# Give the bot permission to push changes back to the repo
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rebuild token.json
        run: |
          echo '${{ secrets.BLOGGER_TOKEN }}' > token.json

      - name: Run the News Scraper
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python app.py

      # --- NEW STEP: Save the updated README ---
      - name: Commit and push updated README
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add README.md
          # Only commit if the README actually changed
          git diff --staged --quiet || git commit -m "Auto-updated README with latest news"
          git push
