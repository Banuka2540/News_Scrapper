name: Auto News Scraper

# Run every 6 hours AND allow manual triggers
on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Grab your code from the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Install Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Install the required libraries
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Magically recreate your token.json securely!
      - name: Rebuild token.json
        run: |
          echo '${{ secrets.BLOGGER_TOKEN }}' > token.json

      # 5. Run the Python script with your secret API keys injected!
      - name: Run the News Scraper
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
